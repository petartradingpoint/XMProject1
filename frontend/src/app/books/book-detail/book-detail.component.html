<section class="mx-auto max-w-xl">
  <a
    routerLink="/books"
    class="mb-4 inline-block text-sm text-slate-500 hover:text-emerald-600"
    >&larr; Back to books</a
  >

  <div
    *ngIf="error"
    class="mb-4 rounded-md border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700"
  >
    {{ error }}
  </div>

  <div *ngIf="loading" class="py-10 text-center text-slate-400">Loading…</div>

  <article
    *ngIf="book"
    class="rounded-lg border border-slate-200 bg-white p-6 shadow-sm"
  >
    <div class="mb-4 flex items-start justify-between">
      <div>
        <h1 class="text-2xl font-bold text-slate-900">{{ book.title }}</h1>
        <p class="text-slate-500">by {{ book.authors.join(', ') }}</p>
      </div>
      <span
        *ngIf="book.genre"
        class="rounded-full bg-slate-100 px-3 py-1 text-xs font-medium text-slate-600"
        >{{ book.genre }}</span
      >
    </div>

    <div class="mb-6 rounded-lg bg-slate-50 px-4 py-4">
      <div class="mb-2 flex items-center justify-between">
        <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-500">
          Rating
        </h2>
        <span class="text-sm text-slate-500">
          {{ book.rating ? book.rating + '/5 stars' : 'Unrated' }}
        </span>
      </div>
      <div class="flex items-center gap-2">
        <button
          *ngFor="let star of starValues"
          type="button"
          (click)="rate(star)"
          [disabled]="savingRating"
          class="text-3xl leading-none transition hover:scale-110 disabled:cursor-not-allowed disabled:opacity-60"
          [class.text-amber-400]="(book.rating ?? 0) >= star"
          [class.text-slate-300]="(book.rating ?? 0) < star"
          [attr.aria-label]="'Rate ' + star + ' out of 5 stars'"
        >
          {{ (book.rating ?? 0) >= star ? '★' : '☆' }}
        </button>
      </div>
      <p *ngIf="savingRating" class="mt-2 text-xs text-slate-400">Saving rating…</p>
    </div>

    <dl class="grid grid-cols-2 gap-4 text-sm">
      <div>
        <dt class="text-slate-400">ISBN</dt>
        <dd class="font-medium text-slate-800">{{ book.isbn }}</dd>
      </div>
      <div>
        <dt class="text-slate-400">Published Year</dt>
        <dd class="font-medium text-slate-800">{{ book.publishedYear }}</dd>
      </div>
    </dl>

    <div class="mt-6 flex items-center gap-3 border-t border-slate-100 pt-4">
      <a
        [routerLink]="['/books', book.id, 'edit']"
        class="rounded-md bg-slate-900 px-4 py-2 text-sm font-semibold text-white transition hover:bg-slate-700"
        >Edit</a
      >
      <button
        type="button"
        (click)="delete()"
        class="rounded-md border border-red-300 px-4 py-2 text-sm font-semibold text-red-600 transition hover:bg-red-50"
      >
        Delete
      </button>
    </div>
  </article>
</section>
