<section>
  <div class="mb-6 flex items-center justify-between">
    <h1 class="text-2xl font-bold text-slate-900">Authors</h1>
    <a
      routerLink="/authors/new"
      class="rounded-lg bg-emerald-600 px-4 py-2 text-sm font-semibold text-white shadow-sm transition hover:bg-emerald-700"
      >+ Add Author</a
    >
  </div>

  <div
    *ngIf="error"
    class="mb-4 rounded-md border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700"
  >
    {{ error }}
  </div>

  <div *ngIf="loading" class="py-10 text-center text-slate-400">Loading…</div>

  <div
    *ngIf="!loading && authors.length === 0 && !error"
    class="rounded-lg border border-dashed border-slate-300 bg-white py-12 text-center text-slate-500"
  >
    No authors found.
  </div>

  <div
    *ngIf="!loading && authors.length > 0"
    class="grid grid-cols-1 gap-4 sm:grid-cols-2"
  >
    <a
      *ngFor="let author of authors"
      [routerLink]="['/authors', author.id]"
      class="block rounded-lg border border-slate-200 bg-white p-5 shadow-sm transition hover:border-emerald-300 hover:shadow"
    >
      <h2 class="text-lg font-semibold text-slate-900">{{ author.name }}</h2>
      <p class="mt-1 text-sm text-slate-500">
        <span *ngIf="author.nationality">{{ author.nationality }}</span>
        <span *ngIf="author.nationality && author.birthYear"> &middot; </span>
        <span *ngIf="author.birthYear">b. {{ author.birthYear }}</span>
        <span *ngIf="!author.nationality && !author.birthYear" class="text-slate-300"
          >No details</span
        >
      </p>
      <p class="mt-3 text-xs font-medium uppercase tracking-wide text-emerald-600">
        {{ author.books.length }}
        {{ author.books.length === 1 ? 'book' : 'books' }}
      </p>
    </a>
  </div>
</section>
