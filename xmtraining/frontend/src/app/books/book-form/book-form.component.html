<section class="mx-auto max-w-xl">
  <a
    routerLink="/books"
    class="mb-4 inline-block text-sm text-slate-500 hover:text-emerald-600"
    >&larr; Back to books</a
  >

  <h1 class="mb-6 text-2xl font-bold text-slate-900">
    {{ isEdit ? 'Edit Book' : 'Add Book' }}
  </h1>

  <div
    *ngIf="error"
    class="mb-4 rounded-md border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700"
  >
    {{ error }}
  </div>

  <div *ngIf="loading" class="py-10 text-center text-slate-400">Loading…</div>

  <form
    *ngIf="!loading"
    [formGroup]="form"
    (ngSubmit)="submit()"
    class="space-y-4 rounded-lg border border-slate-200 bg-white p-6 shadow-sm"
  >
    <div>
      <label class="mb-1 block text-sm font-medium text-slate-700">Title</label>
      <input
        formControlName="title"
        class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500"
      />
      <p
        *ngIf="form.controls.title.touched && form.controls.title.invalid"
        class="mt-1 text-xs text-red-600"
      >
        Title is required (max 255 characters).
      </p>
    </div>

    <div formArrayName="authors">
      <label class="mb-1 block text-sm font-medium text-slate-700">Authors</label>

      <div
        *ngFor="let control of authors.controls; let i = index"
        class="mb-2 flex items-center gap-2"
      >
        <input
          [formControlName]="i"
          placeholder="Author name"
          class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500"
        />
        <button
          type="button"
          (click)="removeAuthor(i)"
          [disabled]="authors.length === 1"
          class="rounded-md border border-slate-300 px-3 py-2 text-sm text-slate-600 transition hover:bg-slate-100 disabled:opacity-40"
          aria-label="Remove author"
        >
          &times;
        </button>
      </div>

      <button
        type="button"
        (click)="addAuthor()"
        class="text-sm font-medium text-emerald-600 hover:text-emerald-700"
      >
        + Add author
      </button>

      <p
        *ngIf="authors.touched && authors.invalid"
        class="mt-1 text-xs text-red-600"
      >
        At least one author is required (each max 255 characters).
      </p>
    </div>

    <div>
      <label class="mb-1 block text-sm font-medium text-slate-700">ISBN</label>
      <input
        formControlName="isbn"
        class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500"
      />
      <p
        *ngIf="form.controls.isbn.touched && form.controls.isbn.invalid"
        class="mt-1 text-xs text-red-600"
      >
        ISBN is required.
      </p>
    </div>

    <div>
      <label class="mb-1 block text-sm font-medium text-slate-700"
        >Published Year</label
      >
      <input
        type="number"
        formControlName="publishedYear"
        class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500"
      />
      <p
        *ngIf="
          form.controls.publishedYear.touched &&
          form.controls.publishedYear.invalid
        "
        class="mt-1 text-xs text-red-600"
      >
        Enter a valid year.
      </p>
    </div>

    <div>
      <label class="mb-1 block text-sm font-medium text-slate-700"
        >Genre <span class="text-slate-400">(optional)</span></label
      >
      <input
        formControlName="genre"
        class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500"
      />
    </div>

    <div class="flex items-center justify-end gap-3 pt-2">
      <button
        type="button"
        (click)="cancel()"
        class="rounded-md border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700 transition hover:bg-slate-100"
      >
        Cancel
      </button>
      <button
        type="submit"
        [disabled]="saving"
        class="rounded-md bg-emerald-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-emerald-700 disabled:opacity-50"
      >
        {{ saving ? 'Saving…' : isEdit ? 'Update Book' : 'Create Book' }}
      </button>
    </div>
  </form>
</section>
